##
# Sudarshan — Nginx Reverse Proxy Configuration
# Sits in front of Gunicorn (Flask) on port 5000
##

# Rate-limit zone: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;

upstream sudarshan_app {
    server web:5000;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/sudarshan/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sudarshan/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Max upload size (for scan targets / reports)
    client_max_body_size 10M;

    # ── Static files (served directly by Nginx) ────────────────────────
    location /static/ {
        alias /app/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Application ────────────────────────────────────────────────────
    location / {
        limit_req zone=app_limit burst=20 nodelay;

        proxy_pass http://sudarshan_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running scans
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── Health check (no rate limit) ───────────────────────────────────
    location /api/health {
        proxy_pass http://sudarshan_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
}
