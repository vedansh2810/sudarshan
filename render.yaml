# ─────────────────────────────────────────────────────────────────────
# Sudarshan — Render Blueprint (Infrastructure as Code)
# Deploy all services with: render.com → New → Blueprint → Select repo
# ─────────────────────────────────────────────────────────────────────

services:
  # ── 1. Flask Web Server (Gunicorn) ──────────────────────────────────
  - type: web
    name: sudarshan-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # Paste your Supabase PostgreSQL connection string
      - key: SUPABASE_URL
        sync: false   # e.g. https://xxxxx.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: REDIS_URL
        fromService:
          name: sudarshan-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: sudarshan-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sudarshan-redis
          type: redis
          property: connectionString

  # ── 2. Celery Background Worker ─────────────────────────────────────
  - type: worker
    name: sudarshan-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    plan: free
    region: singapore
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: REDIS_URL
        fromService:
          name: sudarshan-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: sudarshan-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sudarshan-redis
          type: redis
          property: connectionString

  # ── 3. Redis (Message Broker) ───────────────────────────────────────
  - type: redis
    name: sudarshan-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []   # Only Render internal traffic
