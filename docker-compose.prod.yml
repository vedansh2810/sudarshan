# ============================================================
# Sudarshan — Production Docker Compose (Oracle Cloud)
# ============================================================
# Usage:
#   cp .env.production .env
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/app/static:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ── Flask / Gunicorn ───────────────────────────────────────
  web:
    build: .
    expose:
      - "5000"
    volumes:
      - sudarshan_data:/app/data
      - sudarshan_logs:/app/logs
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker ──────────────────────────────────────────
  worker:
    build: .
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    volumes:
      - sudarshan_data:/app/data
      - sudarshan_logs:/app/logs
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Certbot (SSL auto-renewal) ─────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  sudarshan_data:
  sudarshan_logs:
  redis_data:
  certbot_webroot:
  certbot_certs:
