<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SUDARSHAN{% endblock %} — AI Vulnerability Scanner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>" type="image/svg+xml">

  <!-- Fix #1: CSRF meta tag for JS fetch requests (e.g. ML labeling) -->
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="description" content="SUDARSHAN — AI-powered web vulnerability scanner. Detect SQL injection, XSS, CSRF, and 20+ vulnerability types with real-time scanning and ML-powered analysis.">
  <meta name="theme-color" content="#060611">

  <!-- Preconnect for fast font/CDN loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Critical anti-FOUC: ensure content is visible even before CSS animations load.
       This inline style must come BEFORE external stylesheets. -->
  <style>
    /* Prevent invisible content: animate-fade-in-up starts at opacity:0,
       so if CSS hasn't loaded the animation yet, content would be invisible.
       This ensures elements are visible by default until the animation kicks in. */
    .animate-fade-in-up,
    .animate-slide-in {
      opacity: 1;
    }
    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <!-- Fonts loaded normally (render-blocking) to prevent FOUC.
       display=swap ensures text renders with fallback while fonts download.
       Material Symbols icons MUST load before first paint to avoid blank rectangles. -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap">

  <!-- Pre-built Tailwind CSS (replaces CDN for reliability and performance).
       Rebuild after template changes: npm run build:css -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind-built.css') }}">

  <!-- Custom CSS loaded AFTER Tailwind so overrides (e.g. WCAG contrast fix) take effect -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sudarshan.css') }}">

  <!-- Fix #23: Shared JS utilities (sanitizer, password toggle) -->
  <script src="{{ url_for('static', filename='js/utils.js') }}" defer></script>

  {% block head %}{% endblock %}
</head>
<body>
  <!-- Fix #19: Skip navigation for keyboard/screen-reader users -->
  <a href="#main-content" class="skip-nav">Skip to content</a>

  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
