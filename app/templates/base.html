<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SUDARSHAN{% endblock %} — AI Vulnerability Scanner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>" type="image/svg+xml">

  <!-- Fix #1: CSRF meta tag for JS fetch requests (e.g. ML labeling) -->
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <!-- Preconnect + DNS prefetch for fast font/CDN loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">

  <!-- Fix #21/#22: Preload critical font files for faster rendering -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" as="style">

  <!-- Load fonts with display=swap for fastest text rendering -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet">

  <!-- Fix #20/#23: Local custom CSS (cacheable, no FOUC for custom styles) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sudarshan.css') }}">

  <!-- Tailwind CDN: compiles utility classes before first paint.
       ⚠ PRODUCTION WARNING: Replace with a pre-built CSS file via
       `npx tailwindcss -o dist/tailwind.css --minify` for production.
       The CDN is ~300ms slower and not recommended for production use. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#00e5ff',
            'accent-purple': '#a855f7',
            'bg-primary': '#060611',
            'bg-secondary': '#0a0a1e',
            'bg-card': '#0d0d24',
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          keyframes: {
            'fade-in-up': { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' }},
            'pulse-glow': { '0%,100%': { boxShadow: '0 0 10px rgba(0,229,255,0.3)' }, '50%': { boxShadow: '0 0 25px rgba(0,229,255,0.6)' }},
            'slide-in': { '0%': { opacity: 0, transform: 'translateX(-20px)' }, '100%': { opacity: 1, transform: 'translateX(0)' }},
            'nav-shimmer': { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(200%)' }},
          },
          animation: {
            'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
            'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
            'slide-in': 'slide-in 0.3s ease-out forwards',
            'nav-shimmer': 'nav-shimmer 2s ease-in-out infinite',
          },
        }
      }
    }
  </script>

  <!-- Fix #23: Shared JS utilities (sanitizer, password toggle) -->
  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>

  {% block head %}{% endblock %}
</head>
<body>
  <!-- Fix #19: Skip navigation for keyboard/screen-reader users -->
  <a href="#main-content" class="skip-nav">Skip to content</a>

  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
