<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sudarshan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00d4aa; --accent-glow: rgba(0,212,170,0.3); }
        body { background: #0a0a1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .auth-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(0,212,170,0.05) 0%, transparent 60%), radial-gradient(ellipse at 70% 50%, rgba(124,58,237,0.05) 0%, transparent 60%); }
        .auth-card { background: rgba(15,15,42,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; position: relative; z-index: 1; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #00d4aa, #7c3aed); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; margin: 0 auto 14px; box-shadow: 0 0 30px rgba(0,212,170,0.3); }
        .logo-title { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: white; }
        .logo-sub { color: #64748b; font-size: 13px; margin-top: 4px; }
        h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .sub { color: #64748b; font-size: 14px; margin-bottom: 28px; }
        .form-control { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #e2e8f0; border-radius: 10px; padding: 12px 14px; font-size: 14px; }
        .form-control:focus { background: rgba(255,255,255,0.06); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); color: #e2e8f0; }
        .form-control::placeholder { color: #475569; }
        .input-group-text { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #64748b; }
        .form-label { color: #94a3b8; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .btn-login { background: linear-gradient(135deg, #00d4aa, #00b38f); color: #000; border: none; border-radius: 10px; padding: 13px; font-weight: 700; font-size: 15px; width: 100%; transition: all 0.2s; }
        .btn-login:hover { filter: brightness(1.1); box-shadow: 0 0 25px rgba(0,212,170,0.4); color: #000; }
        .divider { text-align: center; color: #475569; font-size: 12px; margin: 20px 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.07); }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .link-accent { color: var(--accent); text-decoration: none; font-weight: 500; }
        .link-accent:hover { text-decoration: underline; color: var(--accent); }
        .alert-error { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); color: #f87171; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="auth-bg"></div>
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
        <div class="logo-title">SUDARSHAN</div>
        <div class="logo-sub">Web Vulnerability Scanner</div>
    </div>
    <h2>Sign In</h2>
    <p class="sub">Access your security dashboard</p>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert-error"><i class="fas fa-exclamation-triangle me-2"></i>{{ message }}</div>
        {% endfor %}
    {% endwith %}
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
    </form>
    <div class="divider">OR</div>
    <div style="text-align:center; font-size:14px; color:#64748b;">
        Don't have an account? <a href="{{ url_for('auth.register') }}" class="link-accent">Create one</a>
    </div>
    <div style="text-align:center;margin-top:28px;font-size:11px;color:#334155;">
        <i class="fas fa-shield-alt me-1" style="color:var(--accent)"></i>
        For authorized security testing only
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
