{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}

{% block body %}
<div class="login-bg min-h-screen flex items-center justify-center font-display">
  <div id="main-content" class="text-center animate-fade-in-up max-w-lg px-6">
    <div class="mb-8 relative inline-block">
      <div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
      <div class="relative w-20 h-20 bg-[#060611] border border-primary/50 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(0,229,255,0.3)] mx-auto">
        <span class="material-symbols-outlined text-primary text-5xl">search_off</span>
      </div>
    </div>
    <h1 class="text-7xl font-black text-primary neon-text mb-4 font-mono">404</h1>
    <h2 class="text-2xl font-bold text-white mb-3">Page Not Found</h2>
    <p class="text-slate-400 text-sm mb-8 leading-relaxed">The page you're looking for doesn't exist or has been moved. Check the URL or navigate back.</p>
    <div class="flex items-center justify-center gap-4">
      <a href="/" class="bg-primary text-[#060611] px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:scale-105 transition-transform shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined">home</span> Go Home
      </a>
      <a href="javascript:history.back()" class="border border-white/10 text-slate-300 px-6 py-3 rounded-xl font-semibold hover:bg-white/5 transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined">arrow_back</span> Go Back
      </a>
    </div>
  </div>
</div>
{% endblock %}
