{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}

{% block body %}
<div class="login-bg min-h-screen flex items-center justify-center font-display">
  <div id="main-content" class="text-center animate-fade-in-up max-w-lg px-6">
    <div class="mb-8 relative inline-block">
      <div class="absolute inset-0 bg-red-500/20 blur-2xl rounded-full"></div>
      <div class="relative w-20 h-20 bg-[#060611] border border-red-500/50 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(255,45,85,0.3)] mx-auto">
        <span class="material-symbols-outlined text-red-500 text-5xl">error</span>
      </div>
    </div>
    <h1 class="text-7xl font-black text-red-500 mb-4 font-mono" style="text-shadow: 0 0 20px rgba(255,45,85,0.5)">500</h1>
    <h2 class="text-2xl font-bold text-white mb-3">Internal Server Error</h2>
    <p class="text-slate-400 text-sm mb-8 leading-relaxed">Something went wrong on our end. The issue has been logged and our team will investigate.</p>
    <div class="flex items-center justify-center gap-4">
      <button onclick="location.reload()" class="bg-primary text-[#060611] px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:scale-105 transition-transform shadow-lg shadow-primary/20 cursor-pointer border-0">
        <span class="material-symbols-outlined">refresh</span> Retry
      </button>
      <a href="/" class="border border-white/10 text-slate-300 px-6 py-3 rounded-xl font-semibold hover:bg-white/5 transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined">home</span> Go Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
