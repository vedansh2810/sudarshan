# ============================================================================
# Sudarshan Web Vulnerability Scanner — Docker Compose
# ============================================================================
# Usage:
#   docker compose up --build          # Start all services
#   docker compose up --build web      # Web only (no Redis/Celery)
#   docker compose down -v             # Stop & remove volumes
# ============================================================================

services:
  # ── Flask Web Application ────────────────────────────────────────────────
  web:
    build: .
    container_name: sudarshan-web
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sudarshan-net

  # ── Redis (Celery broker, SSE pub/sub, rate-limiter storage) ─────────────
  redis:
    image: redis:7-alpine
    container_name: sudarshan-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sudarshan-net

  # ── Celery Worker (async scan execution) ─────────────────────────────────
  worker:
    build: .
    container_name: sudarshan-worker
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sudarshan-net

volumes:
  redis-data:
    driver: local

networks:
  sudarshan-net:
    driver: bridge
