name: Keep Alive - Hugging Face Spaces
on:
  schedule:
    # Ping every 14 minutes to prevent HF Spaces from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Sudarshan HF Space
        run: |
          # Replace with your actual HF Spaces URL after deployment
          SPACE_URL="${{ vars.HF_SPACE_URL }}"
          if [ -z "$SPACE_URL" ]; then
            echo "HF_SPACE_URL variable not set. Skipping."
            exit 0
          fi
          echo "Pinging $SPACE_URL/api/health ..."
          curl -sf "$SPACE_URL/api/health" --max-time 60 || echo "Space may be starting up"
          echo "Ping complete at $(date)"
